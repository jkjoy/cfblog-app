name: Build App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: Build target
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - ios
          - web
      profile:
        description: EAS build profile
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

permissions:
  contents: write

jobs:
  build-web:
    if: github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'web'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build web
        run: npm run build:web

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist

      - name: Zip web artifact
        run: |
          cd dist
          zip -r ../cfblog-web-${{ github.ref_name || 'manual' }}.zip .

      - name: Upload web asset to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "cfblog-web-${{ github.ref_name }}.zip" \
            --clobber

  build-mobile:
    if: github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'android' || inputs.platform == 'ios'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - android
          - ios

    env:
      BUILD_PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.profile || 'preview' }}

    steps:
      - name: Skip unmatched matrix target
        if: github.event_name == 'workflow_dispatch' && inputs.platform != 'all' && inputs.platform != matrix.platform
        run: echo "Skip ${{ matrix.platform }}"

      - name: Checkout
        if: github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == matrix.platform
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == matrix.platform
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == matrix.platform
        run: npm ci

      - name: Type check
        if: github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == matrix.platform
        run: npm run typecheck

      - name: Setup Expo and EAS
        if: github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == matrix.platform
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Trigger EAS build
        if: github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == matrix.platform
        run: eas build --platform ${{ matrix.platform }} --profile $BUILD_PROFILE --non-interactive --wait --json > build.json

      - name: Download mobile artifact
        if: (github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == matrix.platform) && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          BUILD_ID=$(node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('build.json','utf8')); const item=Array.isArray(data)?data[0]:data; console.log(item.id)")
          eas build:view "$BUILD_ID" --json > build-view.json

          ARTIFACT_URL=$(node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('build-view.json','utf8')); console.log(data?.artifacts?.buildUrl || data?.artifacts?.applicationArchiveUrl || '')")

          if [ -z "$ARTIFACT_URL" ]; then
            echo "No artifact URL found"
            cat build-view.json
            exit 1
          fi

          if [ "${{ matrix.platform }}" = "android" ]; then
            EXT="apk"
          else
            EXT="ipa"
          fi

          FILE_NAME="cfblog-${{ matrix.platform }}-${{ github.ref_name }}.${EXT}"
          curl -L "$ARTIFACT_URL" -o "$FILE_NAME"
          echo "artifact_name=$FILE_NAME" >> "$GITHUB_OUTPUT"
        id: mobile_artifact

      - name: Upload mobile artifact to release
        if: (github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == matrix.platform) && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "${{ steps.mobile_artifact.outputs.artifact_name }}" \
            --clobber
